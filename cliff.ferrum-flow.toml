# Changelog for ferrum-flow (crates/core). Used by CI release job.
# Pair with: --tag vX.Y.Z  (previous tag is the latest matching tag_pattern only)

[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
# Only consider v* tags when finding the previous release (not sync_plugin_v*).
tag_pattern = "v[0-9].*"
# Only commits that touch the core crate (avoids sync_plugin / unrelated paths).
include_paths = ["crates/core/**"]
sort_commits = "oldest"
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^doc", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactor" },
    { message = "^test", group = "Testing" },
    { message = "^chore", group = "Miscellaneous" },
    { message = "^ci", skip = true },
]
