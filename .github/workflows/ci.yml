name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [ "master" ]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-ci:
    name: Rust CI (fmt, check, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies (gpui)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            cmake \
            libasound2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libx11-dev \
            libx11-xcb-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxrandr-dev \
            libxi-dev \
            libxcursor-dev \
            libxinerama-dev \
            libgl1-mesa-dev

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check --workspace --all-targets

      - name: Clippy
        run: |
          cargo clippy -p ferrum-flow --all-targets
          cargo clippy -p ferrum-flow-sync-plugin --all-targets

      - name: Tests
        run: |
          cargo test -p ferrum-flow --all-targets --no-fail-fast
          cargo test -p ferrum-flow-sync-plugin --all-targets --no-fail-fast
