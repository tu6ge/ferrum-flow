# CI on all branch pushes + PRs to master; **crate publish + GitHub Release only on push to master**
# after quality checks pass in the same run (`needs: rust-ci` + job-level `if` on `publish`).
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["master"]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-ci:
    name: Rust CI (fmt, check, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install GPUI apt dependencies
        uses: ./.github/actions/install-gpui-apt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Rustfmt
        run: cargo fmt --all -- --check

      - name: Cargo check
        run: cargo check --workspace --all-targets

      - name: Clippy
        run: |
          cargo clippy -p ferrum-flow --all-targets
          cargo clippy -p ferrum-flow-sync-plugin --all-targets

      - name: Tests
        run: |
          cargo test -p ferrum-flow --all-targets --no-fail-fast
          cargo test -p ferrum-flow-sync-plugin --all-targets --no-fail-fast

  publish:
    name: Publish ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: rust-ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    environment: cargo

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - package: ferrum-flow
            dir: /crates/core
            tag_prefix: v
            cliff_config: cliff.ferrum-flow.toml
          - package: ferrum-flow-sync-plugin
            dir: /crates/sync_plugin
            tag_prefix: sync-plugin-v
            cliff_config: cliff.sync-plugin.toml

    outputs:
      published: ${{ steps.publish.outputs.publish }}
      new_version: ${{ steps.publish.outputs.new_version }}
      new_version_value: ${{ steps.publish.outputs.new_version_value }}
      tag_prefix: ${{ matrix.tag_prefix }}
      package: ${{ matrix.package }}
      cliff_config: ${{ matrix.cliff_config }}

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install GPUI apt dependencies
        uses: ./.github/actions/install-gpui-apt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run publish-action
        id: publish
        uses: tu6ge/publish-action@v0.6.0-beta.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        with:
          DIR: ${{ matrix.dir }}
          TAG_PREFIX: ${{ matrix.tag_prefix }}

  # One release job per matrix leg of `publish` (do not add a second matrix here).
  release:
    name: Release ${{ needs.publish.outputs.package }}
    runs-on: ubuntu-latest
    needs: publish
    if: needs.publish.outputs.published == 'true'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve tag for this crate
        id: version
        run: |
          VERSION="${{ needs.publish.outputs.new_version_value }}"
          TAG="${{ needs.publish.outputs.tag_prefix }}${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: cliff
        with:
          config: ${{ needs.publish.outputs.cliff_config }}
          args: --tag ${{ steps.version.outputs.tag }} --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ needs.publish.outputs.package }} ${{ steps.version.outputs.tag }}
          body: ${{ steps.cliff.outputs.content }}
          draft: false
          prerelease: false
