# Shared system packages for GPUI / ferrum-flow on Ubuntu runners.
name: Install GPUI (Linux) apt dependencies
description: Install pkg-config, OpenSSL, X11/Wayland, and GL dev packages needed to build gpui.
runs:
  using: composite
  steps:
    - name: Install system dependencies (gpui)
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          pkg-config \
          cmake \
          libssl-dev \
          libasound2-dev \
          libfontconfig1-dev \
          libfreetype6-dev \
          libwayland-dev \
          libxkbcommon-dev \
          libxkbcommon-x11-dev \
          libx11-dev \
          libx11-xcb-dev \
          libxcb-render0-dev \
          libxcb-shape0-dev \
          libxcb-xfixes0-dev \
          libxrandr-dev \
          libxi-dev \
          libxcursor-dev \
          libxinerama-dev \
          libgl1-mesa-dev
